apiVersion: apps/v1
kind: Deployment
metadata:
  name: payload-processor
  namespace: ${NAMESPACE}
  labels:
    app: payload-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payload-processor
  template:
    metadata:
      labels:
        app: payload-processor
    spec:
      serviceAccountName: payload-processor
      containers:
        - name: payload-processor
          image: ${IPP_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - --grpc-port=9004
            - --grpc-health-port=9005
            - --metrics-port=9090
            - --secure-serving=false
            - --tracing=false
            - --metrics-endpoint-auth=false
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9004
              name: grpc
            - containerPort: 9005
              name: health
            - containerPort: 9090
              name: metrics
          readinessProbe:
            grpc:
              port: 9005
            initialDelaySeconds: 5
            periodSeconds: 5
